<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Στάθης AI</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; background-color: #f4f4f9; }
        #chat-log { height: 400px; border: 1px solid #ccc; background-color: white; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        input { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 20%; padding: 10px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Στάθης AI - Συνέντευξη</h2>
    <div id="chat-log">
        <div style="background-color: #eee; padding: 10px; border-radius: 10px; margin-bottom: 5px;">
            Στάθης: Γεια! Δοκίμασε να μου στείλεις ένα μήνυμα.
        </div>
    </div>
    <div>
        <input type="text" id="user-input" placeholder="Γράψε εδώ...">
        <button id="send-btn">Αποστολή</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
