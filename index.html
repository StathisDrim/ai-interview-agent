<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Interview Call</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app-box">

<!-- CALL SCREEN -->
<div id="call-screen">

<div class="avatar-ring">
<img src="avatar.png">
</div>

<h2>AI Interview</h2>
<p>Connecting call...</p>

<button onclick="acceptCall()">Accept Call</button>

</div>

<!-- MEETING SCREEN -->
<div id="meeting-screen">

<div class="videos">

<div class="video-box">
<div class="placeholder">HR</div>
</div>

<div class="video-box">
<img src="avatar.png">
</div>

</div>

<div class="chat-container">

<div id="chatbox"></div>

<div class="input-area">
<input id="question" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
