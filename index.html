<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Agent</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div id="call-screen" class="call-screen">
            <div class="avatar">
                <img src="avatar.png" alt="Avatar">
            </div>
            <div class="caller-name">Στάθης</div>
            <div class="status">Εισερχόμενη κλήση...</div>
            <div class="actions">
                <button id="accept-btn" class="accept">
                    <span>📞</span> Αποδοχή
                </button>
            </div>
        </div>

        <div id="chat-screen" class="chat-container hidden">
            <div class="chat-header">Συνέντευξη με τον Στάθη</div>
            <div id="chat-log" class="chat-messages">
                <div class="message stathis">
                    <strong>Στάθης:</strong> Γεια! Είμαι έτοιμος για τη συνέντευξη. Τι θέλεις να με ρωτήσεις;
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Γράψε εδώ...">
                <button id="send-btn">Στείλε</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
