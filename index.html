<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stathis | AI Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">

        <div id="call-screen" class="screen-content">
            <div class="apple-call-card">
                <div class="avatar-wrapper">
                    <div class="pulse-ring"></div>
                    <img src="stathis-calling.jpg" alt="Stathis" class="calling-avatar">
                </div>
                <h1 class="caller-name">Στάθης</h1>
                <p class="call-status">Εισερχόμενη AI κλήση...</p>
                
                <div class="call-buttons">
                    <button id="decline-btn" class="btn-circular decline">✕</button>
                    <button id="accept-btn" class="btn-circular accept">✓</button>
                </div>
            </div>
        </div>

        <div id="chat-screen" class="screen-content hidden">
            <div class="glass-interface">
                
                <div class="video-grid">
                    <div class="video-box hr-box">
                        <img src="hr-avatar.png" alt="HR" class="hr-avatar-img">
                        <span class="name-label">HR Manager</span>
                    </div>
                    <div class="video-box stathis-box">
                        <video id="live-video" loop muted playsinline>
                            <source src="stathis-live.mp4" type="video/mp4">
                            <img src="stathis-live.jpg" alt="Stathis Live">
                        </video>
                        <span class="name-label stathis-label">● LIVE | Στάθης</span>
                    </div>
                </div>

                <div class="chat-container">
                    <div id="chat-log" class="chat-log">
                        <div class="ai-bubble">
                            Γεια σου! Είμαι ο ψηφιακός βοηθός του Στάθη. Τι θα ήθελες να μάθεις για εκείνον;
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <input type="text" id="user-input" placeholder="Ρώτησε κάτι τον Στάθη...">
                        <button id="send-btn">➜</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
