<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Agent - Στάθης</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-background">
        <img src="bg.jpg" alt="Background" class="bg-image">
    </div>

    <div class="glass-container">
        <div id="call-screen" class="call-screen">
            <div class="avatar-container">
                <img src="avatar.png" alt="Avatar" class="avatar-image">
            </div>
            <div class="caller-info">
                <h1>Στάθης - Warehouse Specialist</h1>
                <p>Εισερχόμενη Κλήση...</p>
            </div>
            <div class="call-actions">
                <button id="accept-btn" class="accept-btn">
                    <i>📞</i> Αποδοχή
                </button>
            </div>
        </div>

        <div id="chat-screen" class="chat-screen hidden">
            <div class="chat-header">
                <h2>Συνέντευξη με τον Στάθη</h2>
            </div>
            <div id="chat-log" class="chat-log">
                <div class="message ai-message">
                    <strong>Στάθης:</strong> Γεια σου! Είμαι ο ψηφιακός Στάθης. Παρακαλώ, κάνε μου την πρώτη σου ερώτηση για τη θέση στην αποθήκη.
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Πληκτρολογήστε την ερώτησή σας...">
                <button id="send-btn">Αποστολή</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
